version: '3.8'

services:
  app:
    build: .
    container_name: signboard_app
    ports:
      - "5000:5000"
    volumes:
      - ./database:/app/database
    environment:
      - FLASK_APP=main.py
      - FLASK_ENV=production
      - REMOTE_ACCESS_ENABLED=false # 加值功能開關
    restart: always

  # 未來可擴充 rclone 定時備份容器
  # backup:
  #   image: rclone/rclone
  #   ...
