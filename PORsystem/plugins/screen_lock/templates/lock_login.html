<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>解鎖看板畫面</title>
    <!-- 套用系統原生樣式風格 -->
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .login-card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        .lock-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }
        h1 { 
            color: #1a73e8; 
            margin-bottom: 1.5rem; 
            font-size: 1.8rem;
        }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1.1rem; 
            box-sizing: border-box; 
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background: #1a73e8; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.2rem; 
            cursor: pointer; 
            transition: background 0.3s; 
            margin-top: 1rem; 
            font-weight: bold;
        }
        button:hover { 
            background: #1557b0; 
        }
        .error { 
            color: #d93025; 
            margin-top: 15px; 
            background: #fce8e6;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="lock-icon">🔒</span>
        <h1>解鎖看板畫面</h1>
        <form method="POST">
            <!-- 遵照使用者指示：維持帳號與密碼輸入 -->
            <input type="text" name="username" placeholder="帳號" required autofocus autocomplete="username">
            <input type="password" name="password" placeholder="密碼" required autocomplete="current-password">
            <button type="submit">解除鎖定</button>
        </form>
        
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
    </div>
</body>
</html>
