{% extends "layout.html" %}
{% block title %}修改密碼{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <h1>修改密碼</h1>
    <form action="/change_password" method="post">
        <label style="display: block; margin-bottom: 8px; font-weight: bold;">輸入新密碼:</label>
        <input type="password" name="password" required style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; font-size: 1.2rem; box-sizing: border-box;">
        
        <button type="submit" style="background: var(--warning); color: #333; font-size: 1.5rem;">確認修改</button>
    </form>
</div>
{% endblock %}
