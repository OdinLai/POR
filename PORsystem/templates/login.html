<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 投影看板計畫</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 2rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1.2rem; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 1.3rem; cursor: pointer; transition: background 0.3s; margin-top: 1rem; }
        button:hover { background: #1557b0; }
        .error { color: #d93025; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>投影看板計畫</h1>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="帳號" required autofocus>
            <input type="password" name="password" placeholder="密碼" required>
            <button type="submit">登入系統</button>
        </form>
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <p class="error">{{ message }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}
    </div>
</body>
</html>
