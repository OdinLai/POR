{% extends "layout.html" %}
{% block title %}新增資料{% endblock %}

{% block content %}
<h1>新增看板項目</h1>

<div style="background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);">
    <form action="/add_item" method="post">
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">序號將由系統根據排列順序自動生成 (01-99)。</p>
        
        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px; font-weight: bold;">內容描述:</label>
            <textarea name="content" rows="5" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box;" placeholder="請輸入訂單詳情、客戶名稱或製作要求..."></textarea>
        </div>
        
        <button type="submit" style="background: var(--success); font-size: 1.5rem;">新增至 [訂貨] 欄位</button>
    </form>
</div>
{% endblock %}
